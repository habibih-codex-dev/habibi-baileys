name: Publish to NPM

# Bisa di-trigger 3 cara:
#  1. Push tag versi baru (contoh: v1.0.0, v1.2.3)  -> rilis otomatis
#  2. Bikin GitHub Release                          -> rilis otomatis
#  3. Tombol "Run workflow" di tab Actions          -> rilis manual (tanpa terminal)
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # buat npm provenance (opsional tapi bagus)

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Cek versi package.json == tag git (cuma pas dipicu lewat tag)
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          echo "package.json: $PKG_VERSION | tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Versi di package.json ($PKG_VERSION) nggak cocok sama tag ($TAG_VERSION). Update dulu versinya."
            exit 1
          fi

      - name: Publish ke NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
